services:
  postgres:
    image: docker.io/library/postgres:18.1-trixie
    container_name: sgia_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Lasin1234
      POSTGRES_DB: postgres
    ports:
      - "5434:5432"
    volumes:
      - lasin_pg_data:/var/lib/postgresql
      - ./Scripts/01-create-databases.sql:/docker-entrypoint-initdb.d/01-create-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - lasin-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.4
    container_name: lasin_kc
    restart: on-failure:2
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: Lasin1234
      KC_DB_SCHEMA: public
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_URL: http://localhost:8088
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: true
      KC_METRICS_ENABLED: true
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_LOG_LEVEL: INFO
    ports:
      - "8088:8080"
    volumes:
      - lasin_kc_data:/opt/keycloak/data
      - ./keycloak/realm-import.json:/opt/keycloak/data/import/realm-import.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: start-dev --import-realm
    networks:
      - lasin-network

  webapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lasin_aspnetcore_webapi
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5150
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=sgia_db;Username=postgres;Password=Lasin1234
      Keycloak__Authority: http://keycloak:8080/realms/sgia-realm
      Keycloak__Audience: backend-client
    ports:
      - "5150:5150"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - lasin-network

volumes:
  lasin_pg_data:
  lasin_kc_data:

networks:
  lasin-network:
    driver: bridge
